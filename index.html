<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOPORTAL ESPOL</title>

    <link rel="stylesheet" href="lib/ol.css">
	<link rel="stylesheet" href="lib/ol-layerswitcher/dist/ol-layerswitcher.css">
	<link rel="stylesheet" href="estilos.css">

    <script src="lib/dist/ol.js"></script>
	<script src="lib/ol-layerswitcher/dist/ol-layerswitcher.js"></script>


</head>
<body>
    
    <div style="display: flex">
		<div style="flex: 1; display: flex; width: 100%; max-width: 500px; margin-left: 0; margin-right: auto; margin-top: 0px; justify-content: flex-start;">
		    <img src="espol_logo.png" style="max-width: 400px; width: 70%; height: auto; object-fit: contain; box-sizing: border-box; padding: 0 20px; margin-left: 0; margin-right: auto;">
		</div>
		
		<div style="flex: 2; text-align: center"; class="heading">
			<h3 style="margin: 0; margin-top: 40px; margin-bottom: 20px;">GEOPORTAL ESPOL</h3>
		</div>

		<div style="flex: 1;"></div>

	</div>

	<style>
	/* Seleccionar el botón del layerswitcher para esconderlo */
	.layer-switcher button[aria-label="Collapse legend"],
	.layer-switcher button[title="Collapse legend"],
	.layer-switcher > button {
		display: none !important;
	}

	/* Para que la lista del panel siempre sea visible */
	.layer-switcher .panel {
		display: block !important;
	}

	/* Mantener el background styling constante para no colapsar en un square box */
	.layer-switcher.ol-collapsed {
		background-color: var(--ol-background-color, rgba(255, 255, 255, 0.8)) !important;
	}
	</style>

	<div id="map"></div>

	<div id="popup" class="ol-popup">
  		<a href="#" id="popup-closer" class="ol-popup-closer"></a>
  		<div id="popup-content"></div>
	</div>

	<script src="main.js"></script>

	

    


</body>
</html>
